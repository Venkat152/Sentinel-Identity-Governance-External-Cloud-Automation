<template>
    <lightning-card title="Sentinel Identity Governance" icon-name="custom:custom15">
        
        <div slot="actions">
            <lightning-button-group>
                <lightning-button 
                    label="Deactivate" 
                    variant="destructive-text"
                    icon-name="utility:user_remove" 
                    onclick={handleBulkDeactivate} 
                    disabled={isDeactivateDisabled}>
                </lightning-button>
                <lightning-button 
                    label="Bulk Reset Password" 
                    icon-name="utility:lock" 
                    onclick={handleBulkPassword} 
                    disabled={isCredentialResetDisabled}>
                </lightning-button>
                <lightning-button 
                    label="Bulk Reset MFA" 
                    icon-name="utility:shield" 
                    onclick={handleBulkMFA} 
                    disabled={isCredentialResetDisabled}>
                </lightning-button>
                <lightning-button 
                    label="Bulk Backup & Purge" 
                    variant="destructive" 
                    icon-name="utility:database" 
                    onclick={handleBulkPurge} 
                    disabled={isPurgeDisabled}>
                </lightning-button>
            </lightning-button-group>
        </div>

        <lightning-tabset variant="scoped">
            <lightning-tab label="Team Operations">
                <div class="slds-p-around_medium">
                    <template if:true={teamData}>
                        <!-- Search Input -->
                        <div class="slds-m-bottom_medium">
                            <lightning-input
                                type="search"
                                placeholder="Search by name or email..."
                                value={searchTeam}
                                onchange={handleTeamSearch}
                                icon-name="utility:search">
                            </lightning-input>
                        </div>

                        <!-- Datatable -->
                        <lightning-datatable
                            key-field="Id"
                            data={paginatedTeamData}
                            columns={columns}
                            sorted-by={sortBy}
                            sorted-direction={sortDirection}
                            onsort={handleSort}
                            onrowselection={handleRowSelection}>
                        </lightning-datatable>


                        <!-- Pagination Controls -->
                        <div class="slds-m-top_medium">
                            <div class="slds-grid slds-grid_align-center">
                                <lightning-button 
                                    label="Previous" 
                                    icon-name="utility:chevronleft"
                                    onclick={handleTeamPreviousPage}
                                    disabled={isTeamFirstPage}>
                                </lightning-button>
                                <span class="slds-m-horizontal_medium slds-align-middle">{teamPaginationInfo}</span>
                                <lightning-button 
                                    label="Next" 
                                    icon-name="utility:chevronright"
                                    icon-position="right"
                                    onclick={handleTeamNextPage}
                                    disabled={isTeamLastPage}>
                                </lightning-button>
                            </div>
                        </div>
                    </template>
                </div>
            </lightning-tab>

            <lightning-tab label="System Compliance">
                <div class="slds-p-around_medium slds-text-align_center">
                    <div class="slds-box slds-theme_shade">
                        <h2 class="slds-text-heading_medium">Run Global Deactivation Batch</h2>
                        <p class="slds-m-vertical_small">Click below to manually trigger the 90-day cleanup and deactivation cycle.</p>
                        
                        <lightning-button 
                            variant="brand" 
                            label="Start Compliance Sync" 
                            onclick={handleStartBatch} 
                            disabled={isBatchRunning}
                            icon-name="utility:sync">
                        </lightning-button>

                        <template if:true={batchJobId}>
                            <div class="slds-m-top_large">
                                <lightning-badge label={batchStatus}></lightning-badge>
                                <div class="slds-m-top_small">
                                    <lightning-button label="Refresh Status" icon-name="utility:refresh" onclick={getBatchStatus}></lightning-button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </lightning-tab>
            <lightning-tab label="Archive Vault" icon-name="standard:archive">
    <div class="slds-p-around_medium">
        <div class="slds-m-bottom_medium">
            <div class="slds-grid slds-grid_vertical">
                <!-- Search Input -->
                <div class="slds-col slds-m-bottom_medium">
                    <lightning-input
                        type="search"
                        placeholder="Search backup files by name..."
                        value={searchArchive}
                        onchange={handleArchiveSearch}
                        icon-name="utility:search">
                    </lightning-input>
                </div>
                
                <!-- Refresh Button -->
                <div class="slds-col">
                    <lightning-button 
                        label="Refresh Archive" 
                        icon-name="utility:refresh" 
                        onclick={refreshArchiveData}
                        disabled={isRefreshingArchive}
                        variant="brand">
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- Datatable -->
        <template if:false={hasNoArchiveData}>
            <lightning-datatable
                key-field="id"
                data={paginatedArchiveData}
                columns={archiveColumns}
                hide-checkbox-column="true"
                onrowaction={handleArchiveRowAction}>
            </lightning-datatable>

            <!-- Pagination Controls -->
            <div class="slds-m-top_medium">
                <div class="slds-grid slds-grid_align-center">
                    <lightning-button 
                        label="Previous" 
                        icon-name="utility:chevronleft"
                        onclick={handleArchivePreviousPage}
                        disabled={isArchiveFirstPage}>
                    </lightning-button>
                    <span class="slds-m-horizontal_medium slds-align-middle">{archivePaginationInfo}</span>
                    <lightning-button 
                        label="Next" 
                        icon-name="utility:chevronright"
                        icon-position="right"
                        onclick={handleArchiveNextPage}
                        disabled={isArchiveLastPage}>
                    </lightning-button>
                </div>
            </div>
        </template>

        <!-- Empty State -->
        <template if:true={hasNoArchiveData}>
            <div class="slds-box slds-theme_shade">
                <p class="slds-text-align_center slds-text-body_regular">No backup files found in Sentinel Vault.</p>
            </div>
        </template>
    </div>
</lightning-tab>
        </lightning-tabset>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
        </template>
    </lightning-card>
</template>
